<div mat-dialog-content>
  <p>Möchten Sie die Lieferanten löschen?</p>
  <li *ngFor="let lieferant of data.lieferanten">
    {{lieferant.name}} - {{lieferant.address}}
  </li>
  <br/>
  <li *ngFor="let error of this.errors" style="color: red;">
    {{error}}
  </li>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="this.dialogRef.close(true)" [disabled]="checkIfDisabled()">Ja</button>
  <button mat-button cdkFocusInitial (click)="this.dialogRef.close(false)">Nein</button>
</div>
