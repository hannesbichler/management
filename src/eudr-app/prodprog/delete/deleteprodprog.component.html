<div mat-dialog-content>
  <p>Möchten Sie die Productionsprogramme löschen?</p>
  <li *ngFor="let prodprog of data.prodprog">
    {{prodprog.prodprog_nr}} - {{prodprog.jahr}}
  </li>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="this.dialogRef.close(true)">Ja</button>
  <button mat-button cdkFocusInitial (click)="this.dialogRef.close(false)">Nein</button>
</div>
