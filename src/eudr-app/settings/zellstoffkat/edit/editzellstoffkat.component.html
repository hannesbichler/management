<h2 mat-dialog-title>{{this.data.caption}}</h2>

<mat-dialog-content class="mat-typography">
  <mat-grid-list cols="1" rowHeight="3:1">
    <mat-grid-tile>
      <mat-form-field >
        <mat-label>Name</mat-label>
        <input matInput placeholder="Name" [(ngModel)]="this.data.zellstoffkat.name" required/>
      </mat-form-field>
    </mat-grid-tile>
  </mat-grid-list>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button (click)="this.dialogRef.close(true)">Speichern</button>
  <button mat-raised-button mat-dialog-close cdkFocusInitial (click)="this.dialogRef.close(false)">Abbrechen</button>
</mat-dialog-actions>
